short_bio: >-
  <p>
    Hi there! I'm Yiran Wang, a budding game designer with a lifelong passion for gaming 🌱
  </p>
  <p>
    Ever since I first picked up a controller as a kid, I've been captivated by the magical world of video games. Now, I'm pursuing my dreams at Northeastern University, majoring in Game Science and Design, turning my childhood passion into a career path.
  </p>
  <p>
    When it comes to gaming, I'm particularly drawn to action games and JRPGs. "Sekiro: Shadows Die Twice" holds a special place in my heart - it completely transformed my perspective on game design. 
  </p>
  <p>
    I'm also a huge fan of indie games. Recently, I've been hooked on "Hole io" - these creative works never fail to spark new ideas in my mind. I really admire the unique creativity and unlimited imagination found in indie games.
  </p>
  <p>
    As a game design student, I'm working hard to turn my gaming dreams into reality. I believe great games can do more than just entertain - they can convey emotions, tell stories, and even change players' lives. That's the magic of games, and that's what I'm striving to create!
  </p>
   <p>
    If you're passionate about games too, I'd love to hear about your gaming experiences! Let's explore the endless possibilities of game design together ✨
  </p>
    

